services:
  - type: web
    name: parlant-chat
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python advogado_trabalhista.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
