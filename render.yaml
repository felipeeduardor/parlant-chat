services:
  - type: web
    name: parlant-chat
    env: python
    pythonVersion: "3.11.0"
    buildCommand: "CARGO_HOME=/tmp/cargo pip install -r requirements.txt && pip install . --no-deps"
    startCommand: python advogado_trabalhista.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
